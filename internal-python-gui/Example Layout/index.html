<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO LANG AFTC SSH APP</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,body {
            background: #000000;
            color: #CCCCCC;
            font-family: sans-serif;
            font-size: 0.9rem;
            margin: 20px;
        }

        #app {
            display: block;
            border: 2px solid #FFFFFF;
            /* padding: 10px; */
        }

        #app .output_container {
            border: 1px solid #CCCCCC;
            /* padding: 0px 10px; */
        }

        #app .output_container pre {
            background: #151515;
            margin: 0;
            padding: 10px;
            height: 80vh;
            overflow-y: scroll;
            overflow-x: none;
        }

        #app .user_input_container {
            background: #111122;
            height: 60px;
            padding: 5px 10px;
        }


        #app .connection {
            padding: 10px;
            font-weight: bold;
            background: #242424;
        }

        input {
            font-weight: bold;
            color: #000000;
        }

        input:focus, div:focus {
            outline: none;
        }

        button {
            font-weight: bold;
            cursor: pointer;
        }

        #app .status {
            padding: 10px;
            background: #191919;
            font-weight: bold;
        }

        .txt_green {
            color: #009900;
        }

        .txt_red {
            color: #990000;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="output_container"><pre>
// OUTPUT FROM SSH AND CONNECTION STATUS EG:

Connecting to: root@127.0.0.1 using password *********
Connected.

SSH Output:
You show SSH reponses here
            </pre>
        </div>

        <div class="user_input_container" contenteditable="true">
            <!-- this is where user can enter command as if using the cli -->
            >
        </div>

        <div class="connection">
            <form>
                Connect to <input type="text" class="input_connect" placeholder="Enter eg root@127.0.0.1" required>
            <!-- Yes password is visible in the GO LANG APP -->
            Password <input type="text" class_input_password" placeholder="Enter Password" required>
            <button>CONNECT</button>
            </form>
        </div>
        
        <div class="status">
            <!-- This would need to update when disconnect happens or is not connected yet etc -->
            STATUS: <span class="txt_green">CONNECTED</span> Server running at: http://127.0.0.85:8564
        </div>
    </div>
    
</body>
</html>
